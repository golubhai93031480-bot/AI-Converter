<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - AI Converter</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}
header{
background:#111827;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#38bdf8;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
}
.card a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>

<header>🤖 AI Converter Dashboard</header>

<div class="grid">

<div class="card">
<a href="#">💬 AI Chat</a>
</div>

<div class="card">
<a href="#">🖼️ AI Image</a>
</div>

<div class="card">
<a href="#">🎥 AI Video</a>
</div>

<div class="card">
<a href="#">🎤 AI Voice</a>
</div>

<div class="card">
<a href="#">👤 Profile</a>
</div>

<div class="card">
<a href="#">⚙️ Settings</a>
</div>

</div>

</body>
</html>
