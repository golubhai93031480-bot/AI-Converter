<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#38bdf8;
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-weight:bold;
}

#chat{
height:60vh;
overflow-y:auto;
padding:20px;
}

.message{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

.bottom{
display:flex;
padding:15px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h2>🤖 AI Chat</h2>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</nav>
</header>

<div id="chat">
<div class="message">👋 Welcome! Type a message below.</div>
</div>

<div class="bottom">
<input id="msg" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(input.value.trim()=="") return;

chat.innerHTML += "<div class='message'>🧑 "+input.value+"</div>";
chat.innerHTML += "<div class='message'>🤖 AI Reply: This feature will be connected soon.</div>";

input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
