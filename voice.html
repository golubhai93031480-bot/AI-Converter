<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Generator</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}
header{
background:#111827;
padding:20px;
font-size:30px;
font-weight:bold;
color:#38bdf8;
}
.container{
padding:30px;
}
textarea{
width:90%;
max-width:600px;
height:120px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
margin-top:20px;
padding:15px 35px;
background:#38bdf8;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
.result{
margin-top:30px;
padding:20px;
background:#1e293b;
border-radius:10px;
display:inline-block;
}
</style>

</head>
<body>

<header>🎤 AI Voice Generator</header>

<div class="container">

<h2>Enter Text</h2>

<textarea placeholder="Type text to convert into voice..."></textarea>

<br>

<button>Generate Voice</button>

<div class="result">
<p>Your AI voice will appear here.</p>
</div>

</div>

</body>
</html>
