<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Converter</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:#1e293b;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
width:100%;
padding:12px;
background:#38bdf8;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>🔐 Login</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

<p>Don't have an account? Sign Up (Coming Soon)</p>
</div>

</body>
</html>
