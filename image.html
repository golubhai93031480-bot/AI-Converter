<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#38bdf8;
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-weight:bold;
}

.container{
padding:30px;
}

textarea{
width:90%;
max-width:600px;
height:120px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 35px;
background:#38bdf8;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:30px;
}

img{
max-width:300px;
border-radius:15px;
margin-top:20px;
}
</style>

</head>
<body>

<header>
<h2>🖼️ AI Image Generator</h2>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</nav>

</header>

<div class="container">

<h3>Describe your image</h3>

<textarea id="prompt" placeholder="Example: A futuristic city at sunset"></textarea>

<br>

<button onclick="generateImage()">Generate Image</button>

<div id="result"></div>

</div>

<script>
function generateImage(){
let prompt=document.getElementById("prompt").value;

if(prompt.trim()==""){
alert("Please enter a prompt.");
return;
}

document.getElementById("result").innerHTML=
"<p>⏳ Generating image...</p>";

setTimeout(function(){

document.getElementById("result").innerHTML=
"<p><b>Your Prompt:</b> "+prompt+"</p><img src='https://picsum.photos/300' alt='Demo Image'>";

},1500);

}
</script>

</body>
</html>
